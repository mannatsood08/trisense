<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriSense - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <div class="login-container glass">
        <div class="logo">
            <span class="tri">Tri</span><span class="sense">Sense</span>
        </div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Please sign in to access the monitor</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-messages">
            {% for message in messages %}
              <div class="alert warn">{{ message }}</div>
            {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST" class="login-form">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required autofocus>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
        
        <div class="login-footer">
            <p>New to TriSense? <a href="{{ url_for('signup') }}" style="color: #38bdf8; text-decoration: none; font-weight: 600;">Create an account</a></p>
            <p style="margin-top: 15px; font-size: 11px; opacity: 0.5;">System Status: <span class="status-dot"></span> Secure Connection</p>
        </div>
    </div>
</body>
</html>
